events {
    # 1. Performance: Ek saath kitne log connect ho sakte hain
    worker_connections 1024;
}

http {
     resolver 127.0.0.11 valid=30s;
    resolver_timeout 10s;
    include       mime.types;
    default_type  application/octet-stream;

    # 2. Performance: Gzip (Files ko compress karke bhejna)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # 3. Security: Hide Nginx version
    server_tokens off;

    server {
        listen 80;
        server_name _; # Catch-all for production IPs/Domains

        # 4. Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        # IMPORTANT: Backend API
        location /api/ {
            proxy_pass http://backend:8000;
            
            # Connection Tunneling (Websockets compatibility)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            
            # Passing Real User Info
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }


        # Frontend (Main Website)
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
